name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Build, lint, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build
        run: cargo build --all --locked

      - name: Clippy
        run: cargo clippy --all --all-targets -- -D warnings

      - name: Test
        run: cargo test --all --locked

      - name: Test with firecrawl-extractor feature
        # Phase D: validate the optional Firecrawl html-extractor path
        # builds and tests pass with the feature enabled. Off by default
        # in production but exercised in CI to catch upstream API churn.
        run: cargo test --all --locked --features crw-extract/firecrawl-extractor

      - name: Clippy with firecrawl-extractor feature
        run: cargo clippy --all --all-targets --features crw-extract/firecrawl-extractor -- -D warnings