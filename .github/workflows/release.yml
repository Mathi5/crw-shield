name: Release

on:
  push:
    tags:
      - "v*.*.*"

# Required for `softprops/action-gh-release` to create the release,
# and for the Docker push to GHCR.
permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Pre-flight: run the full test + lint suite. If this fails, the release
  # is aborted — never ship broken code.
  test:
    name: Test & lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all --all-targets -- -D warnings

      - name: Test
        run: cargo test --all --locked

  # Build the release binary for 3 targets in parallel.
  # - linux x86_64: native cargo build
  # - linux aarch64: cargo build --target with the rustup target
  #   (works on Ubuntu runners without needing cross/Docker-in-Docker;
  #    BoringSSL/wreq builds natively for aarch64-linux-gnu)
  # - macOS: deferred to v0.2.0 (BoringSSL/cmake toolchain on the
  #   macOS GitHub runner needs a setup step that is non-trivial to
  #   get right — see the v0.1.0 release notes for details).
  build:
    name: Build binary (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: crw-shield-linux-x86_64.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: crw-shield-linux-aarch64.tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: crw-shield-linux-x86_64-musl.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install build dependencies (BoringSSL/wreq)
        if: matrix.target == 'aarch64-unknown-linux-gnu' || matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential pkg-config libclang-dev perl \
            gcc-aarch64-linux-gnu \
            musl-tools

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          RUSTFLAGS=""
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            RUSTFLAGS="-C target-feature=+crt-static"
          fi
          RUSTFLAGS="$RUSTFLAGS" cargo build \
            --release \
            --target ${{ matrix.target }} \
            --features crw-fetch/tls-fingerprint \
            --locked

      - name: Strip binary
        shell: bash
        run: |
          BINARY=target/${{ matrix.target }}/release/crw-server
          if [ ! -f "$BINARY" ]; then
            echo "ERROR: $BINARY not found"
            ls -la target/${{ matrix.target }}/release/
            exit 1
          fi
          strip "$BINARY" || true
          ls -la "$BINARY"

      - name: Package archive
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          DIR="crw-shield-$VERSION-${{ matrix.target }}"
          mkdir -p "$DIR"
          cp "target/${{ matrix.target }}/release/crw-server" "$DIR/crw-shield"
          cp LICENSE README.md "$DIR/"
          tar -czf "${{ matrix.archive }}" -C "$DIR" .
          ls -la "${{ matrix.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 7

  # Publish the GitHub Release with all archives attached.
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List downloaded artifacts
        run: ls -la dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/crw-shield-linux-x86_64.tar.gz/crw-shield-linux-x86_64.tar.gz
            dist/crw-shield-linux-aarch64.tar.gz/crw-shield-linux-aarch64.tar.gz
            dist/crw-shield-linux-x86_64-musl.tar.gz/crw-shield-linux-x86_64-musl.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build and push the Docker image to GHCR.
  # linux/amd64 only for v0.1.0 (multi-arch is blocked on the same
  # QEMU/builder setup as the macOS builds; tracked for v0.2.0).
  docker:
    name: Docker image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/Mathi5/crw-shield:${{ steps.version.outputs.VERSION }}
            ghcr.io/Mathi5/crw-shield:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
