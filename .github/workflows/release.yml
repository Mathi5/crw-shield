name: Release

on:
  push:
    tags:
      - "v*.*.*"

# Required for `softprops/action-gh-release` to create the release,
# and for the Docker push to GHCR.
permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Pre-flight: run the full test + lint suite. If this fails, the release
  # is aborted — never ship broken code.
  test:
    name: Test & lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all --all-targets -- -D warnings

      - name: Test
        run: cargo test --all --locked

  # Build the release binary for 4 platforms in parallel.
  # `cross` is used for non-native triples (musl targets need it; we use
  # gnu here for glibc compat, which works on stock Ubuntu runners).
  build:
    name: Build binary (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: crw-shield-linux-x86_64.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: crw-shield-linux-aarch64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: crw-shield-darwin-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: crw-shield-darwin-aarch64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install cross (for non-native triples)
        if: matrix.os == 'ubuntu-latest' && matrix.target != 'x86_64-unknown-linux-gnu'
        run: cargo install cross --locked

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
            cargo build --release --target ${{ matrix.target }} --features crw-fetch/tls-fingerprint --locked
          else
            cross build --release --target ${{ matrix.target }} --features crw-fetch/tls-fingerprint --locked
          fi

      - name: Strip binary
        shell: bash
        run: |
          BINARY=target/${{ matrix.target }}/release/crw-server
          if [ ! -f "$BINARY" ]; then
            echo "ERROR: $BINARY not found"
            ls -la target/${{ matrix.target }}/release/
            exit 1
          fi
          strip "$BINARY"
          ls -la "$BINARY"

      - name: Package archive
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          DIR="crw-shield-$VERSION-${{ matrix.target }}"
          mkdir -p "$DIR"
          cp "target/${{ matrix.target }}/release/crw-server" "$DIR/crw-shield"
          cp LICENSE README.md "$DIR/"
          tar -czf "${{ matrix.archive }}" -C "$DIR" .
          ls -la "${{ matrix.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 7

  # Publish the GitHub Release with all 4 archives attached.
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List downloaded artifacts
        run: ls -la dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/crw-shield-linux-x86_64.tar.gz/crw-shield-linux-x86_64.tar.gz
            dist/crw-shield-linux-aarch64.tar.gz/crw-shield-linux-aarch64.tar.gz
            dist/crw-shield-darwin-x86_64.tar.gz/crw-shield-darwin-x86_64.tar.gz
            dist/crw-shield-darwin-aarch64.tar.gz/crw-shield-darwin-aarch64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build and push the Docker image to GHCR.
  docker:
    name: Docker image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/Mathi5/crw-shield:${{ steps.version.outputs.VERSION }}
            ghcr.io/Mathi5/crw-shield:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
