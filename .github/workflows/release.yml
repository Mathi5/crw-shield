name: Release

on:
  push:
    tags:
      - "v*.*.*"
  # Manual trigger for re-running a release without re-pushing the tag.
  # Used after the automatic tag-trigger skipped (e.g. due to a deleted
  # then re-pushed tag within the GitHub Actions event cache window).
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist on origin, e.g. v0.2.0)"
        required: true
        type: string

# Required for `softprops/action-gh-release` to create the release,
# and for the Docker push to GHCR.
permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Pre-flight: run the full test + lint suite. If this fails, the release
  # is aborted — never ship broken code.
  test:
    name: Test & lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all --all-targets -- -D warnings

      - name: Test
        run: cargo test --all --locked

  # Build the release binary. v0.1.0 ships only linux x86_64 because
  # the BoringSSL/wreq build chain needs a C cross-toolchain for
  # aarch64 and a musl sysroot for static linking, both of which
  # require non-trivial setup. Tracked for v0.2.0.
  build:
    name: Build binary (linux x86_64)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Build release binary
        run: |
          cargo build \
            --release \
            --features crw-fetch/tls-fingerprint \
            --locked

      - name: Strip binary
        shell: bash
        run: |
          BINARY=target/release/crw-server
          if [ ! -f "$BINARY" ]; then
            echo "ERROR: $BINARY not found"
            ls -la target/release/ | head -20
            exit 1
          fi
          strip "$BINARY"
          ls -la "$BINARY"

      - name: Package archive
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          DIR="crw-shield-$VERSION-linux-x86_64"
          mkdir -p "$DIR"
          cp target/release/crw-server "$DIR/crw-shield"
          cp LICENSE README.md "$DIR/"
          tar -czf "crw-shield-linux-x86_64.tar.gz" -C "$DIR" .
          ls -la "crw-shield-linux-x86_64.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: crw-shield-linux-x86_64
          path: crw-shield-linux-x86_64.tar.gz
          if-no-files-found: error
          retention-days: 7

  # Publish the GitHub Release with the archive attached.
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List downloaded artifacts
        run: ls -la dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: dist/crw-shield-linux-x86_64/crw-shield-linux-x86_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build and push the Docker image to GHCR. linux/amd64 only for v0.1.0;
  # multi-arch (linux/arm64) is tracked for v0.2.0.
  docker:
    name: Docker image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/mathi5/crw-shield:${{ steps.version.outputs.VERSION }}
            ghcr.io/mathi5/crw-shield:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make GHCR package public
        # The GHCR image is MIT-licensed; no need to keep it private. Public
        # visibility lets Runtipi (and anyone else) pull the image without
        # configuring a GHCR_PAT. Idempotent — re-running on the same package
        # is a no-op.
        #
        # IMPORTANT: GitHub repositories owned by a *user* (not an org) live in
        # the user namespace `/users/<login>`, not `/orgs/<login>`. The GHCR
        # API 404s on `/orgs/Mathi5/...` because "Mathi5" is a user, not an
        # org. We lowercase the owner to be safe — GHCR is case-sensitive and
        # expects `mathi5`, not `Mathi5`.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Strip any accidental uppercase; the GitHub API expects the exact
          # canonical lowercase login for `/users/...` lookups.
          PACKAGE_OWNER: ${{ lower(github.repository_owner) }}
          PACKAGE_NAME: crw-shield
        run: |
          set -euo pipefail
          status=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/users/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME}" \
            --jq '.visibility // empty')
          if [ "${status}" != "public" ]; then
            echo "Package visibility: ${status:-unknown} -> setting to public"
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/users/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME}" \
              -f visibility=public
          else
            echo "Package already public, skipping"
          fi
