services:
  crw-shield:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - RUST_LOG=info
      - HOST=0.0.0.0
      - PORT=3002
      # SEARXNG_URL=
      # FlareSolverr is opt-in per host. Leave FLARESOLVERR_URL and
      # FLARESOLVERR_HOSTS blank to disable FS entirely. Forcing FS
      # globally is not recommended — the L2-only path handles most
      # sites without escalation.
      - FLARESOLVERR_URL=
      # Comma-separated list of hosts to escalate to FlareSolverr.
      # Supports `*.example.com` wildcards. Apex entries (no `*.`) also
      # match subdomains. Leave blank to disable FS entirely even when
      # FLARESOLVERR_URL is set.
      - FLARESOLVERR_HOSTS=nowsecure.nl,perimeterx.com,kasada.io,datadome.co,leboncoin.fr,etsy.com,stackoverflow.com
      # SEARXNG_TOKEN=
      # AUTH_TOKEN=
      # STEALTH_ENABLED=true
      # BEHAVIORAL_SIMULATION=true
      # SCRAPE_DELAY_PRESET=polite
      # CRAWL_MAX_CONCURRENCY=5
      # PROXY_URL=
      # TLS-impersonation-proxy (opt-in, see crates/fetch/src/tls_proxy.rs).
      # When TLS_PROXY_ENABLED=true, a Go sidecar (tls-impersonate-proxy)
      # is spawned at startup; Chrome's HTTPS is routed through it with a
      # byte-perfect browser TLS ClientHello (via bogdanfinn/tls-client).
      # This unlocks Cloudflare IUAM and similar fingerprint-sensitive
      # challenges. Default is OFF — vanilla BoringSSL fingerprint.
      # Rotation ladder: when a block is detected, the L2 handler kills
      # the proxy and respawns it with the next profile in
      # TLS_PROXY_PROFILES (default: chrome_120, chrome_117, chrome_107,
      # firefox_117, safari_16_0). 5 profiles × 1 retry = up to 10
      # 5 profiles × 1 retry = up to 10 attempts before HITL fallback.
      - TLS_PROXY_ENABLED=true
      - TLS_PROXY_LISTEN=127.0.0.1:7890
      - TLS_PROXY_PROFILE=chrome_120
      - TLS_PROXY_PROFILES=chrome_120,chrome_117,chrome_107,firefox_117,safari_16_0
      - TLS_PROXY_ROTATION_DELAY_SECS=3
      - TLS_PROXY_CA_DIR=/var/lib/crw-shield/tls-ca
      - TLS_PROXY_BYPASS=localhost,127.0.0.1,::1
      - TLS_PROXY_TIMEOUT_SECS=60
      # Phase 2 — profile warming. **DISABLED by default** (see
      # CRW_WARMUP_ENABLED below). Setting CRW_PROFILE_DIR creates a
      # persistent Chrome profile that conflicts with chromiumoxide's
      # Browser lifecycle — see `crates/fetch/src/cdp.rs::warmup_profile`
      # for the full rationale. To enable in production, the Browser
      # must be spawned ephemerally for warmup (separate process) then
      # killed before the real Browser::launch. Not done yet.
      # - CRW_PROFILE_DIR=/var/lib/crw-shield/profile
      - CRW_WARMUP_ENABLED=false
      # Phase 3 — rate limiter (min interval + random jitter between
      # consecutive scrapes). 2000ms min + 500ms jitter matches
      # cortex-bridge's defaults. Set both to 0 to disable entirely.
      # Note: for benchmarks, set jitter low or 0 to avoid 20-30s extra
      # wait on 9-site sequential panels.
      - RATE_LIMIT_MIN_MS=0
      - RATE_LIMIT_JITTER_MS=0
      # HITL cookie persistence + Discord notification. The cookie jar is
      # reloaded from this file at startup and snapshotted back every 60s,
      # so `cf_clearance` and other solved-challenge cookies survive a
      # container restart. Empty value = in-memory only (no persistence).
      - COOKIE_PERSISTENCE_PATH=/var/lib/crw-shield/cookies.json
      # Set this to a Discord webhook URL (Server Settings → Integrations →
      # Webhooks → New webhook → Copy URL) and the server will ping the
      # channel every time a HITL challenge is auto-enqueued, with the
      # challenge kind, URL, id, and a ready-to-paste curl solve command.
      # Empty = no notifications.
      # - DISCORD_WEBHOOK_HITL_URL=
    volumes:
      # Persistent CA dir for the TLS-impersonate-proxy (so the CA survives
      # container restarts). Comment out the TLS_PROXY_* env vars above
      # to disable the proxy entirely.
      - crw-shield-tls-ca:/var/lib/crw-shield/tls-ca
      # Persistent Chrome profile dir — UNCOMMENT WITH CRW_PROFILE_DIR above
      # to re-enable profile warming. Off until chromiumoxide Browser lifecycle
      # is fixed (SingletonLock leaks across Browser::launch calls).
      # - crw-shield-profile:/var/lib/crw-shield/profile
    restart: unless-stopped

volumes:
  crw-shield-tls-ca: