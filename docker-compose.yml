services:
  crw-shield:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - RUST_LOG=info
      - HOST=0.0.0.0
      - PORT=3002
      # SEARXNG_URL=http://host.docker.internal:8080
      - FLARESOLVERR_URL=
      # SEARXNG_TOKEN=***
      # AUTH_TOKEN=***
      # STEALTH_ENABLED=true
      # BEHAVIORAL_SIMULATION=true
      # SCRAPE_DELAY_PRESET=polite
      # CRAWL_MAX_CONCURRENCY=5
      # PROXY_URL=
      # TLS-impersonation-proxy (opt-in, see crates/fetch/src/tls_proxy.rs).
      # When TLS_PROXY_ENABLED=true, a Go sidecar (tls-impersonate-proxy)
      # is spawned at startup; Chrome's HTTPS is routed through it with a
      # byte-perfect browser TLS ClientHello (via bogdanfinn/tls-client).
      # This unlocks Cloudflare IUAM and similar fingerprint-sensitive
      # challenges. Default is OFF — vanilla BoringSSL fingerprint.
      # Rotation ladder: when a block is detected, the L2 handler kills
      # the proxy and respawns it with the next profile in
      # TLS_PROXY_PROFILES (default: chrome_120, chrome_117, chrome_107,
      # firefox_117, safari_16_0). 5 profiles × 1 retry = up to 10
      # 5 profiles × 1 retry = up to 10 attempts before HITL fallback.
      - TLS_PROXY_ENABLED=true
      - TLS_PROXY_LISTEN=127.0.0.1:7890
      - TLS_PROXY_PROFILE=chrome_120
      - TLS_PROXY_PROFILES=chrome_120,chrome_117,chrome_107,firefox_117,safari_16_0
      - TLS_PROXY_ROTATION_DELAY_SECS=3
      - TLS_PROXY_CA_DIR=/var/lib/crw-shield/tls-ca
      - TLS_PROXY_BYPASS=localhost,127.0.0.1,::1
      - TLS_PROXY_TIMEOUT_SECS=60
      # Phase 2 — profile warming. Setting CRW_PROFILE_DIR enables
      # persistent Chrome profile + 4-URL warmup on first launch
      # (Cookies/History/Cache seeded to look "lived-in" to anti-bot
      # heuristics). Without this, the profile is in-memory and warming
      # is skipped. See crates/fetch/src/cdp.rs::warmup_profile.
      - CRW_PROFILE_DIR=/var/lib/crw-shield/profile
    volumes:
      # Persistent CA dir for the TLS-impersonate-proxy (so the CA survives
      # container restarts). Comment out the TLS_PROXY_* env vars above
      # to disable the proxy entirely.
      - crw-shield-tls-ca:/var/lib/crw-shield/tls-ca
      # Persistent Chrome profile dir so warming + cookies survive restarts.
      - crw-shield-profile:/var/lib/crw-shield/profile
    restart: unless-stopped

volumes:
  crw-shield-tls-ca:
  crw-shield-profile: