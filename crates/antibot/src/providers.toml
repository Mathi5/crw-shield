# --- Generic rate limit ---
[providers.generic_rate_limit]
kind = "rate-limit"
tokens = [
    "rate limit",
    "rate-limit",
    "too many requests",
    "slow down",
    "request throttled",
]
status_codes = [429]
headers = ["retry-after", "x-ratelimit-*"]
suggested_ladder = "retry-with-delay"
notes = "Back off and retry. Use cookies / different IP / different UA."

# --- Geo-block ---
[providers.geo_block]
kind = "soft-block"
tokens = [
    "not available in your country",
    "not available in your region",
    "geo-blocked",
    "geo restricted",
    "your region",
    "country not supported",
]
status_codes = [403, 451]
headers = []
suggested_ladder = "none"
notes = "Bypass requires proxy/VPN from allowed region. No software ladder step can solve."

# --- Login wall ---
[providers.login_wall]
kind = "login-wall"
tokens = [
    "sign in to continue",
    "log in to continue",
    "please log in",
    "login required",
    "create an account to continue",
    "members only",
    "subscribe to read",
    "paywall",
]
status_codes = [401, 402, 403]
headers = []
suggested_ladder = "cdp"
notes = "Auth wall. CDP + user-supplied session cookies may help."

# --- Soft 404 (Amazon, ...) ---
[providers.soft_404]
kind = "soft-block"
tokens = [
    "page not found",
    "sorry, we just need to make sure you're not a robot",
    "no longer available",
    "this product is unavailable",
    "amazon page not found",
    "page does not exist",
    "looks like you've reached a dead end",
]
status_codes = [404, 410]
headers = []
suggested_ladder = "none"
notes = "Real 404, no bot block. Return as-is; ladder has nothing to do."

# --- Generic 'access denied' ---
[providers.generic_access_denied]
kind = "waf"
tokens = [
    "access denied",
    "access denied (403)",
    "forbidden",
    "request forbidden",
    "you don't have permission to access",
]
status_codes = [403]
headers = []
suggested_ladder = "cdp"
notes = "Generic 403. Try CDP/FlareSolverr. May be IP-based or geo-based."

