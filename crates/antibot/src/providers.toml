# crw-shield anti-bot provider signatures
# Source: distilled from microlinkhq/is-antibot (MIT), VeNoMouS/cloudscraper,
# krakeninferno/is-antibot, and observed production behavior in 2025-2026.
#
# Format:
#   [providers.<name>]
#   kind = "challenge" | "captcha" | "captcha-invisible" | "waf" | "rate-limit" | "login-wall" | "soft-block"
#   # Tokens that, when found in HTML (case-insensitive), indicate this provider.
#   # The detector picks the provider with the most token matches.
#   tokens = ["...", "..."]
#   # Optional HTTP status codes that, by themselves (without HTML evidence), suggest this provider.
#   status_codes = [403, 503]
#   # Optional headers that, when present, indicate this provider.
#   headers = ["cf-ray", "x-akamai-*"]
#   # Suggested ladder step if this situation is detected.
#   suggested_ladder = "cdp" | "flaresolverr" | "none" | "retry-with-delay"
#   # Free-form notes for the operator.
#   notes = "..."

# --- Cloudflare ---
[providers.cloudflare_iuam]
kind = "challenge"
tokens = [
    "challenges.cloudflare.com",
    "cf-chl-bypass",
    "__cf_chl_jschl_tk__",
    "cf-mitigated",
    "ray id",
    "cf_chl_prog",
    "__cf_chl_jschl_tk__",
    "/cdn-cgi/challenge-platform/",
    "cloudflare-static",
    "cf_chl_seq",
    "turnstile-v0",
]
status_codes = [403, 503, 520, 521, 522, 523, 524]
headers = ["cf-ray", "cf-mitigated"]
suggested_ladder = "cdp"
notes = "JS challenge with browser-side jschl token. CDP almost always solves; FlareSolverr as fallback."

[providers.cloudflare_turnstile]
kind = "captcha-invisible"
tokens = [
    "challenges.cloudflare.com/turnstile",
    "cf-turnstile",
    "cf-turnstile-script",
    "turnstile.render",
]
status_codes = [403]
headers = ["cf-ray"]
suggested_ladder = "cdp"
notes = "Invisible captcha. CDP with stealth solves; FlareSolverr solves; manual reCAPTCHA fallback."

# --- DataDome ---
[providers.datadome_captcha]
kind = "captcha"
tokens = [
    "datadome.co",
    "dd-captcha",
    "ddc-captcha",
    "geo.captcha-delivery",
    "captcha-delivery.com",
    "datadome-captcha",
    "interstitial-captcha",
    "datadome-protected",
]
status_codes = [403]
headers = ["x-dd-b", "x-datadome", "server"]
suggested_ladder = "flaresolverr"
notes = "Heavy JS challenge + device fingerprinting. TLS fingerprint is critical. FlareSolverr beats CDP."

# --- Akamai Bot Manager ---
[providers.akamai_bot_manager]
kind = "challenge"
tokens = [
    "akamai-bm",
    "bm-verify",
    "akamai/abot",
    "pm_akamai",
    "ghostbox-akamai",
    "akamai-bm-sc",
    "akamai challenge",
]
status_codes = [403]
headers = ["x-akamai-*", "x-amz-cf-id", "akamai-grn"]
suggested_ladder = "cdp"
notes = "Heavy fingerprinting + sensor data. TLS fingerprint and CDP stealth required; FlareSolverr often falls back."

# --- Imperva / Incapsula ---
[providers.imperva_incapsula]
kind = "waf"
tokens = [
    "incapsula",
    "_incapsula_resource",
    "imperva",
    "incap_ses_",
    "visid_incap_",
    "reese84",
    "pardon our interruption",
    "you have been blocked",
]
status_codes = [403]
headers = ["x-iinfo", "x-cdn", "incap-ses"]
suggested_ladder = "cdp"
notes = "WAF. CDP can solve; FlareSolverr works on most sites."

